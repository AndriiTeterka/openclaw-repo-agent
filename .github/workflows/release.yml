name: Release Repo Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  npm-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; process.stdout.write(JSON.parse(readFileSync('package.json', 'utf8')).version);")"
          if [ "v${package_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${package_version}" >&2
            exit 1
          fi

      - name: Publish package
        run: npm publish --access public

  runtime-image:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tooling-profile: [polyglot, java17, node20, python311]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute runtime image tags
        id: runtime-tags
        shell: bash
        run: |
          echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; process.stdout.write(JSON.parse(readFileSync('package.json', 'utf8')).version);")"
          if [ "v${package_version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${package_version}" >&2
            exit 1
          fi

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runtime/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENCLAW_TOOLING_PROFILE=${{ matrix.tooling-profile }}
          tags: |
            ghcr.io/${{ steps.runtime-tags.outputs.owner_lower }}/openclaw-repo-agent-runtime:${{ github.ref_name }}-${{ matrix.tooling-profile }}
            ghcr.io/${{ steps.runtime-tags.outputs.owner_lower }}/openclaw-repo-agent-runtime:${{ steps.runtime-tags.outputs.version_no_v }}-${{ matrix.tooling-profile }}
