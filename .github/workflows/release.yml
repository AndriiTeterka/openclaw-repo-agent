name: Release Repo Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          package_version="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; process.stdout.write(JSON.parse(readFileSync('package.json', 'utf8')).version);")"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            if [ "v${package_version}" != "${GITHUB_REF_NAME}" ]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version v${package_version}" >&2
              exit 1
            fi
          fi
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

  runtime-core-publish:
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish runtime-core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtime/Dockerfile.core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/andriiteterka/openclaw-repo-agent-runtime-core:latest

  npm-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - resolve-version
      - runtime-core-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish --access public
