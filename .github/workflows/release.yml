name: Release Repo Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  npm-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install package metadata
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  runtime-image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tooling-profile: [polyglot, java17, node20, python311]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./runtime/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENCLAW_TOOLING_PROFILE=${{ matrix.tooling-profile }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-repo-agent-runtime:${{ github.ref_name }}-${{ matrix.tooling-profile }}
